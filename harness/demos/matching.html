<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>oelt-matching demo</title>
    <script src="/components/oelt.min.js"></script>
  </head>
  <body>
    <main>
      <h1>oelt-matching</h1>

      <oelt-matching id="match">
        <p slot="prompt">Match each country to its capital.</p>
        <oelt-pair prompt="France" value="paris">Paris</oelt-pair>
        <oelt-pair prompt="Japan" value="tokyo">Tokyo</oelt-pair>
        <oelt-pair prompt="Egypt" value="cairo">Cairo</oelt-pair>
      </oelt-matching>

      <oelt-matching id="match2">
        <p slot="prompt">Match the two pairs.</p>
        <oelt-pair prompt="France" value="paris">Paris</oelt-pair>
        <oelt-pair prompt="Japan" value="tokyo">Tokyo</oelt-pair>
      </oelt-matching>

      <h2>Emitted interactions</h2>
      <ul id="events"></ul>
    </main>
    <script>
      addEventListener("oelt-interaction", (e) => {
        const li = document.createElement("li");
        li.textContent = JSON.stringify(e.detail);
        document.getElementById("events").appendChild(li);
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>oelt-branching demo</title>
    <script src="/components/oelt.min.js"></script>
  </head>
  <body>
    <main>
      <h1>oelt-branching</h1>

      <oelt-branching id="scenario" start="n1">
        <script type="application/json">
          {
            "nodes": {
              "n1": {
                "text": "<p>A colleague asks for your password. You…</p>",
                "choices": [
                  { "label": "Share it", "to": "bad", "value": "share" },
                  { "label": "Refuse and report it", "to": "good", "value": "refuse" }
                ]
              },
              "good": {
                "text": "<p>Right call — credentials are never shared.</p>",
                "end": "passed"
              },
              "bad": {
                "text": "<p>That exposes credentials.</p>",
                "choices": [{ "label": "Try again", "to": "n1", "value": "retry" }]
              }
            }
          }
        </script>
      </oelt-branching>

      <h2>Emitted interactions</h2>
      <ul id="events"></ul>
    </main>
    <script>
      addEventListener("oelt-interaction", (e) => {
        const li = document.createElement("li");
        li.textContent = JSON.stringify(e.detail);
        document.getElementById("events").appendChild(li);
      });
    </script>
  </body>
</html>

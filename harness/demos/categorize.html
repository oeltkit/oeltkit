<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>oelt-categorize demo</title>
    <script src="/components/oelt.min.js"></script>
  </head>
  <body>
    <main>
      <h1>oelt-categorize</h1>

      <oelt-categorize id="cat">
        <p slot="prompt">Sort each animal into its group.</p>
        <oelt-bucket value="mammals">Mammals</oelt-bucket>
        <oelt-bucket value="birds">Birds</oelt-bucket>
        <oelt-token bucket="mammals" value="dog">Dog</oelt-token>
        <oelt-token bucket="birds" value="eagle">Eagle</oelt-token>
        <oelt-token bucket="mammals" value="cat">Cat</oelt-token>
      </oelt-categorize>

      <oelt-categorize id="cat2">
        <p slot="prompt">Sort the two animals.</p>
        <oelt-bucket value="mammals">Mammals</oelt-bucket>
        <oelt-bucket value="birds">Birds</oelt-bucket>
        <oelt-token bucket="mammals" value="dog">Dog</oelt-token>
        <oelt-token bucket="birds" value="eagle">Eagle</oelt-token>
      </oelt-categorize>

      <h2>Emitted interactions</h2>
      <ul id="events"></ul>
    </main>
    <script>
      addEventListener("oelt-interaction", (e) => {
        const li = document.createElement("li");
        li.textContent = JSON.stringify(e.detail);
        document.getElementById("events").appendChild(li);
      });
    </script>
  </body>
</html>

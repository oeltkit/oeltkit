<section>
  <h1>Matching</h1>
  <p>
    Match each value to its prompt. Keyboard: focus a value, Space to pick up, left/right to move
    across targets, Space to drop. The runtime records it as a matching interaction.
  </p>
  <oelt-matching id="match1">
    <p slot="prompt">Match each country to its capital.</p>
    <oelt-pair prompt="France" value="paris">Paris</oelt-pair>
    <oelt-pair prompt="Japan" value="tokyo">Tokyo</oelt-pair>
  </oelt-matching>
</section>

<section>
  <h1>Ordering</h1>
  <p>
    Reorder the items. Keyboard: focus an item, Space to pick up, arrows to move, Space to drop. The
    runtime records it as a sequencing interaction.
  </p>
  <oelt-ordering id="order1">
    <p slot="prompt">Order: First, then Second.</p>
    <oelt-item value="first">First</oelt-item>
    <oelt-item value="second">Second</oelt-item>
  </oelt-ordering>
</section>

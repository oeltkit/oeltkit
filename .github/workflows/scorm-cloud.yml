name: SCORM Cloud conformance

# Real-LMS regression net (Task 10): packages every example for each LMS target,
# imports it to SCORM Cloud, drives a deterministic playthrough with Playwright,
# and asserts completion/success/score via the v2 REST API. This is the standing
# proof that the zero-dependency adapters (OQ-001) conform on a real LMS.
#
# NOT run on every push — it consumes SCORM Cloud registration quota. Triggers:
#   - manual (workflow_dispatch)
#   - weekly (Mondays) as a regression heartbeat
#   - push/PR that touches the surfaces affecting packaged output
#     (packages/runtime, packages/cli) or this pipeline itself.
#
# Credentials (SCORM_CLOUD_APP_ID / SCORM_CLOUD_SECRET_KEY) live in repo secrets.
# When absent (fork PRs), the runner SKIPS with a notice and exits 0 — never fails.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1" # 06:17 UTC every Monday
  push:
    branches: [main]
    paths:
      - "packages/runtime/**"
      - "packages/cli/**"
      - "scripts/scorm-cloud/**"
      - ".github/workflows/scorm-cloud.yml"
  pull_request:
    paths:
      - "packages/runtime/**"
      - "packages/cli/**"
      - "scripts/scorm-cloud/**"
      - ".github/workflows/scorm-cloud.yml"

permissions:
  contents: read

concurrency:
  # Do NOT cancel in-progress runs: teardown (delete course + registrations) must
  # complete, or leaked registrations will eat the dev-tier quota.
  group: scorm-cloud-${{ github.ref }}
  cancel-in-progress: false

jobs:
  conformance:
    name: Drive examples on SCORM Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run SCORM Cloud conformance
        env:
          SCORM_CLOUD_APP_ID: ${{ secrets.SCORM_CLOUD_APP_ID }}
          SCORM_CLOUD_SECRET_KEY: ${{ secrets.SCORM_CLOUD_SECRET_KEY }}
        run: node scripts/scorm-cloud/run.mjs

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scorm-cloud-artifacts
          path: scorm-cloud-artifacts/
          retention-days: 14
          if-no-files-found: ignore
